<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Upeva - Adoção de Animais</title>
    <meta name="description" content="Adote um amigo pela Upeva" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3eadc" />
    <script>
      (() => {
        const STORAGE_KEY = 'upeva-theme'
        const isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          ('standalone' in window.navigator && window.navigator.standalone === true)

        const getSystemTheme = () =>
          window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'

        const getInitialThemeColor = (resolvedTheme, pathname) => {
          if (pathname === '/' && isStandalone) {
            return resolvedTheme === 'dark' ? '#352b22' : '#f3eadc'
          }

          if (pathname === '/' || pathname === '/sobre' || pathname === '/contato') {
            return resolvedTheme === 'dark' ? '#352b22' : '#f3eadc'
          }

          if (pathname === '/admin/login' || pathname === '/admin/reset-password') {
            return resolvedTheme === 'dark' ? 'rgb(27, 22, 20)' : 'rgb(249, 248, 245)'
          }

          if (pathname.startsWith('/admin')) {
            return resolvedTheme === 'dark' ? 'rgb(45, 40, 36)' : 'rgb(255, 255, 255)'
          }

          return resolvedTheme === 'dark' ? 'rgb(27, 22, 20)' : 'rgb(249, 248, 245)'
        }

        try {
          const stored = localStorage.getItem(STORAGE_KEY)
          const theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          const resolvedTheme = theme === 'system' ? getSystemTheme() : theme
          const root = document.documentElement
          root.classList.toggle('dark', resolvedTheme === 'dark')
          root.style.colorScheme = resolvedTheme

          const color = getInitialThemeColor(resolvedTheme, window.location.pathname)
          const themeMeta = document.querySelector('meta[name="theme-color"]')
          if (themeMeta) {
            themeMeta.setAttribute('content', color)
          }
          document.body.style.backgroundColor = color
        } catch {}
      })()
    </script>

    <link rel="icon" href="/favicon.ico?v=2" sizes="48x48" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="preload" href="/models/hero/dog.glb" as="fetch" type="model/gltf-binary" crossorigin fetchpriority="high" />
    <link rel="preload" href="/models/hero/cat.glb" as="fetch" type="model/gltf-binary" crossorigin fetchpriority="high" />
    <link rel="preload" href="/brand/upeva-wordmark.svg" as="image" type="image/svg+xml" fetchpriority="high" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Upeva" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
